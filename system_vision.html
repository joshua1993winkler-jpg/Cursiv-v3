<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JWFrontierEvoCore · Sovereign Agent Temple</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&display=swap');
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#020206;color:#d4af37;font-family:"EB Garamond","Georgia",serif;}
  #canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;cursor:grab;}
  #canvas:active{cursor:grabbing;}
  .title{position:absolute;top:4.5vh;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:2;}
  .title h1{font-size:7.2vw;font-weight:700;letter-spacing:0.08em;color:#d4af37;text-shadow:0 0 80px rgba(212,175,55,0.55),0 0 160px rgba(212,175,55,0.2);margin:0;opacity:0;animation:fadeIn 3.5s ease forwards;}
  .title .sub{font-size:1.2vw;letter-spacing:0.5em;color:#5a7a9e;margin-top:0.4vh;opacity:0;animation:fadeIn 3.5s ease 0.8s forwards;}
  .status{position:absolute;bottom:3vh;left:50%;transform:translateX(-50%);font-size:0.9vw;letter-spacing:0.3em;color:#5a7a9e;background:rgba(2,2,6,0.85);padding:8px 40px;border:1px solid rgba(90,122,158,0.3);border-radius:60px;pointer-events:none;z-index:2;white-space:nowrap;}
  .tooltip{position:absolute;background:rgba(3,4,14,0.97);border:1px solid rgba(212,175,55,0.6);color:#d4af37;padding:14px 20px;font-size:0.88vw;max-width:280px;pointer-events:none;opacity:0;transition:opacity .18s;z-index:40;border-radius:3px;line-height:1.5;}
  @keyframes fadeIn{to{opacity:1;}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="title">
  <h1>⬡ JWFrontierEvoCore</h1>
  <div class="sub">Cursiv v3.0 &nbsp;·&nbsp; Sovereign Agent Temple &nbsp;·&nbsp; Joshua Winkler</div>
</div>
<div class="status">Guardian ACTIVE &nbsp;·&nbsp; 14 Agents ALIVE &nbsp;·&nbsp; Vault SEALED &nbsp;·&nbsp; Permanent Central Leader: Joshua Winkler</div>
<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d', {alpha: false});
let w, h, cx, cy, dpr = 1;
let rotX = 0.52, rotY = 0.38, zoom = 1.0;
let isDragging = false, lastMX = 0, lastMY = 0;
let time = 0, mouseX = 0, mouseY = 0;

function resize() {
  dpr = window.devicePixelRatio || 1;
  w   = window.innerWidth;
  h   = window.innerHeight;
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);
  cx = w / 2; cy = h / 2;
}
window.addEventListener('resize', () => { resize(); });
resize();

// ── Phases ────────────────────────────────────────────────────────────────
const phases = [
  {name:"Energy",           color:"#e8a838", desc:"I am the disciplined fire that keeps this temple warm and alive."},
  {name:"Emergency",        color:"#e84a3c", desc:"I stand at the gates when pressure threatens sovereignty."},
  {name:"Grounding GRA",    color:"#5a8a4a", desc:"I return every drifting thought to living reality."},
  {name:"Route",            color:"#4a9cff", desc:"I turn truth into the clearest possible direction."},
  {name:"Structure",        color:"#8a9aa8", desc:"I give form to intention so it can endure."},
  {name:"Connectivity",     color:"#4ad9d9", desc:"I weave every signal into coherent relationship."},
  {name:"Future State",     color:"#9a6ad9", desc:"I hold the 20-year horizon inside every decision."},
  {name:"Recovery",         color:"#6aa87a", desc:"I restore rhythm when the system has been strained."},
  {name:"Adaptive Balance", color:"#d9d96a", desc:"I breathe between building and integration."},
  {name:"Codex",            color:"#c9a23c", desc:"I translate eternal principles into executable law."},
  {name:"Command",          color:"#c93a4a", desc:"I speak the final word when action is required."},
  {name:"Synthesis",        color:"#c96a9a", desc:"I gather all voices into one coherent self."},
  {name:"Frontier",         color:"#f0f0f0", desc:"I stand at the edge and say: there is still more."},
  {name:"PiCore",           color:"#f0d070", desc:"I am the root. Everything else is expression."}
];

// Fibonacci sphere distribution
const RADIUS = 290;
const nodes = phases.map((p, i) => {
  const phi   = Math.acos(1 - 2 * (i + 0.5) / phases.length);
  const theta = Math.PI * 2 * i * 0.618033988;
  return {
    ...p,
    x: RADIUS * Math.sin(phi) * Math.cos(theta),
    y: RADIUS * Math.sin(phi) * Math.sin(theta),
    z: RADIUS * Math.cos(phi),
    baseSize: 7.5 + (i % 3) * 1.2,
  };
});

// ── Real seeded starfield ─────────────────────────────────────────────────
function seededRng(seed) {
  let s = seed;
  return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; };
}
const rng = seededRng(0xdeadbeef);
const STARS = Array.from({length: 420}, () => ({
  x: rng() * 1,
  y: rng() * 1,
  r: rng() * 1.4 + 0.3,
  a: rng() * 0.7 + 0.15,
  twinkle: rng() * Math.PI * 2,
  speed:   rng() * 0.008 + 0.002,
}));

// ── Particles with trails ─────────────────────────────────────────────────
const TRAIL_LEN = 8;
function makeParticle() {
  const from = Math.floor(rng() * nodes.length);
  const to   = (from + 1 + Math.floor(rng() * 5)) % nodes.length;
  return { from, to, progress: rng(), speed: 0.0035 + rng() * 0.003,
           size: 2 + rng() * 1.2, trail: [] };
}
const particles = Array.from({length: 72}, makeParticle);

// ── 3D projection ─────────────────────────────────────────────────────────
function project(x, y, z) {
  const cy_ = Math.cos(rotY), sy_ = Math.sin(rotY);
  const cx_ = Math.cos(rotX), sx_ = Math.sin(rotX);
  let nx = x * cy_ - z * sy_;
  let nz = x * sy_ + z * cy_;
  let ny = y * cx_ - nz * sx_;
  nz     = y * sx_ + nz * cx_;
  const sc = (1200 * zoom) / (nz + 900);
  return { x: cx + nx * sc, y: cy + ny * sc * 0.92, z: nz, s: sc };
}

// ── Hexagon path ──────────────────────────────────────────────────────────
function hexPath(x, y, r, rot) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = rot + (Math.PI / 3) * i;
    i === 0 ? ctx.moveTo(x + r * Math.cos(a), y + r * Math.sin(a))
            : ctx.lineTo(x + r * Math.cos(a), y + r * Math.sin(a));
  }
  ctx.closePath();
}

// ── Interaction ───────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('mousedown', e => { isDragging = true; lastMX = e.clientX; lastMY = e.clientY; });
window.addEventListener('mouseup',  () => isDragging = false);
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  rotY += (e.clientX - lastMX) * 0.003;
  rotX += (e.clientY - lastMY) * 0.003;
  rotX  = Math.max(-1.4, Math.min(1.4, rotX));
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('wheel', e => {
  zoom = Math.max(0.5, Math.min(2.6, zoom - e.deltaY * 0.001));
  e.preventDefault();
}, {passive: false});

// ── Tooltip ───────────────────────────────────────────────────────────────
const tooltip = document.createElement('div');
tooltip.className = 'tooltip';
document.body.appendChild(tooltip);

// ── Main render loop ──────────────────────────────────────────────────────
function draw() {
  // Background
  ctx.fillStyle = '#020206';
  ctx.fillRect(0, 0, w, h);

  // Nebula clouds (layered)
  const neb = [
    {x: cx - 200, y: cy + 80,  rx: 580, ry: 300, a: 0.12, col: 'rgba(18,12,50,1)'},
    {x: cx + 160, y: cy - 120, rx: 400, ry: 220, a: 0.09, col: 'rgba(8,22,45,1)'},
    {x: cx - 60,  y: cy + 30,  rx: 680, ry: 360, a: 0.07, col: 'rgba(30,8,55,1)'},
  ];
  neb.forEach(n => {
    ctx.globalAlpha = n.a;
    ctx.fillStyle   = n.col;
    ctx.beginPath();
    ctx.ellipse(n.x, n.y, n.rx, n.ry, time * 0.015, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Stars — seeded positions, slow individual twinkle
  STARS.forEach(s => {
    const a = s.a * (0.6 + 0.4 * Math.sin(time * s.speed + s.twinkle));
    ctx.globalAlpha = a;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x * w, s.y * h, s.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // ── Project all nodes ─────────────────────────────────────────────────
  const projected = nodes.map(n => ({ n, p: project(n.x, n.y, n.z) }));
  // Sort back-to-front for correct overlap
  projected.sort((a, b) => a.p.z - b.p.z);

  // ── Edges with depth-based opacity ───────────────────────────────────
  for (let i = 0; i < nodes.length; i++) {
    const pi = project(nodes[i].x, nodes[i].y, nodes[i].z);
    if (pi.z < -300) continue;
    for (let j = i + 1; j < nodes.length; j++) {
      const pj = project(nodes[j].x, nodes[j].y, nodes[j].z);
      if (pj.z < -300) continue;
      // Depth: nearer edges are brighter
      const depth  = Math.max(0, Math.min(1, (pi.z + pj.z) / 2 / 600 + 0.5));
      const alpha  = 0.06 + depth * 0.22;
      ctx.strokeStyle = `rgba(90,110,170,${alpha.toFixed(3)})`;
      ctx.lineWidth   = 0.8 + depth * 0.5;
      ctx.beginPath();
      ctx.moveTo(pi.x, pi.y);
      ctx.lineTo(pj.x, pj.y);
      ctx.stroke();
    }
    // Core connections — slightly brighter
    const core  = project(0, 0, 0);
    const depth = Math.max(0, Math.min(1, (pi.z + 0) / 600 + 0.5));
    ctx.strokeStyle = `rgba(180,150,60,${(0.08 + depth * 0.25).toFixed(3)})`;
    ctx.lineWidth   = 0.9;
    ctx.beginPath();
    ctx.moveTo(core.x, core.y);
    ctx.lineTo(pi.x, pi.y);
    ctx.stroke();
  }

  // ── Particles with fading trails ─────────────────────────────────────
  for (const p of particles) {
    p.progress += p.speed;
    if (p.progress >= 1) {
      p.progress = 0;
      p.from = Math.floor(Math.random() * nodes.length);
      p.to   = (p.from + 1 + Math.floor(Math.random() * 6)) % nodes.length;
      p.trail = [];
    }
    const n1   = nodes[p.from], n2 = nodes[p.to];
    const px   = n1.x + (n2.x - n1.x) * p.progress;
    const py   = n1.y + (n2.y - n1.y) * p.progress;
    const pz   = n1.z + (n2.z - n1.z) * p.progress;
    const proj = project(px, py, pz);
    if (proj.z < -350) continue;

    const headColor = n1.color;
    p.trail.unshift({x: proj.x, y: proj.y, col: headColor});
    if (p.trail.length > TRAIL_LEN) p.trail.pop();

    // Draw trail oldest first (fading)
    p.trail.forEach((pt, ti) => {
      const frac = 1 - ti / TRAIL_LEN;
      ctx.globalAlpha = frac * frac * 0.75;
      const sz = p.size * proj.s * 0.026 * frac;
      ctx.fillStyle = pt.col;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, Math.max(0.5, sz), 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // ── Nodes ─────────────────────────────────────────────────────────────
  let hoveredNode = null;
  projected.forEach(({n, p: proj}) => {
    if (proj.z < -280) return;
    const dist    = Math.hypot(mouseX - proj.x, mouseY - proj.y);
    const hover   = dist < 36;
    const pulseMod = 1 + Math.sin(time * 2.2 + n.x * 0.01) * 0.06;
    const sz      = n.baseSize * proj.s * 0.028 * (hover ? 1.4 : 1) * pulseMod;

    // Glow
    ctx.shadowBlur  = hover ? 42 : 20;
    ctx.shadowColor = n.color;
    ctx.fillStyle   = n.color;
    ctx.beginPath();
    ctx.arc(proj.x, proj.y, sz, 0, Math.PI * 2);
    ctx.fill();

    // Core highlight
    ctx.shadowBlur = 4;
    ctx.fillStyle  = 'rgba(255,255,255,0.85)';
    ctx.beginPath();
    ctx.arc(proj.x, proj.y, sz * 0.36, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Label — fade with depth
    const labelAlpha = Math.max(0.3, Math.min(1, (proj.z + 400) / 500));
    ctx.globalAlpha = labelAlpha;
    ctx.fillStyle   = hover ? '#ffffff' : '#c9b87a';
    ctx.font        = `${hover ? 600 : 400} ${Math.round(12 + proj.s * 0.4)}px "EB Garamond", Georgia, serif`;
    ctx.textAlign   = 'center';
    ctx.fillText(n.name, proj.x, proj.y + sz + 16);
    ctx.globalAlpha = 1;

    if (hover) hoveredNode = n;
  });

  // ── Sovereign Core — hexagonal ────────────────────────────────────────
  const core      = project(0, 0, 0);
  const pulse     = 1 + Math.sin(time * 2.1) * 0.07;
  const coreR     = 20 * pulse * zoom;
  const hexRot    = time * 0.18;

  // Outer glow ring
  ctx.shadowBlur  = 80;
  ctx.shadowColor = '#d4af37';
  ctx.strokeStyle = 'rgba(212,175,55,0.35)';
  ctx.lineWidth   = 1.5;
  for (let r = 1.8; r < 3.2; r += 0.6) {
    hexPath(core.x, core.y, coreR * r, hexRot + r * 0.3);
    ctx.stroke();
  }

  // Filled hex
  ctx.shadowBlur = 55;
  ctx.shadowColor = '#f0d070';
  ctx.fillStyle   = '#d4af37';
  hexPath(core.x, core.y, coreR, hexRot);
  ctx.fill();

  // Inner white hex
  ctx.shadowBlur = 12;
  ctx.fillStyle  = 'rgba(255,252,230,0.95)';
  hexPath(core.x, core.y, coreR * 0.42, hexRot + Math.PI / 6);
  ctx.fill();
  ctx.shadowBlur = 0;

  // ── Tooltip ───────────────────────────────────────────────────────────
  if (hoveredNode) {
    tooltip.style.left    = (mouseX + 28) + 'px';
    tooltip.style.top     = (mouseY - 20) + 'px';
    tooltip.innerHTML     = `<strong>${hoveredNode.name}</strong><br><span style="opacity:.85">${hoveredNode.desc}</span>`;
    tooltip.style.opacity = '1';
  } else {
    tooltip.style.opacity = '0';
  }

  time += 0.011;
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
