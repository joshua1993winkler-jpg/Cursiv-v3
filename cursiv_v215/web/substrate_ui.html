  <title>Cursiv — Substrate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #080810;
      --panel:  #0e0e1a;
      --border: #1a1e30;
      --text:   #c4c8dc;
      --dim:    #50587a;
      --sub:    #4a6aff;
      --blast:  #38b060;
      --weave:  #8844cc;
      --warn:   #c04040;
      --gold:   #c0900a;
      --mono:   'Consolas', 'Courier New', monospace;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex-shrink: 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--sub);
      font-size: 13px;
      letter-spacing: 0.12em;
    }
    .logo .tagline { color: var(--dim); font-size: 10px; letter-spacing: 0.08em; }
    .badge { font-size: 10px; padding: 2px 8px; border: 1px solid var(--border); color: var(--dim); border-radius: 2px; }
    .badge.live { border-color: var(--blast); color: var(--blast); }

    /* ── GRID ───────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 230px 1fr 300px;
      flex: 1;
      overflow: hidden;
    }
    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .panel:last-child { border-right: none; }
    .panel-head {
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── SUBSTRATE STATS ────────────────────────── */
    .stat { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); }
    .stat .lbl { color: var(--dim); font-size: 11px; }
    .stat .val { color: var(--sub); font-size: 11px; }

    .section-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--weave);
      margin: 14px 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }

    /* ── INPUTS ─────────────────────────────────── */
    input[type="text"], input[type="password"], textarea, select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 6px 8px;
      width: 100%;
      outline: none;
      border-radius: 2px;
    }
    textarea { resize: none; line-height: 1.5; }
    input:focus, textarea:focus { border-color: var(--sub); }
    select { cursor: pointer; }
    select option { background: var(--panel); }

    /* ── BUTTONS ────────────────────────────────── */
    button {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: var(--mono);
      font-size: 10px;
      padding: 5px 12px;
      cursor: pointer;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    button:hover { border-color: var(--sub); color: var(--sub); }
    button.green { border-color: var(--blast); color: var(--blast); }
    button.green:hover { background: var(--blast); color: var(--bg); }
    button.blue { border-color: var(--sub); color: var(--sub); }
    button.blue:hover { background: var(--sub); color: var(--bg); }
    button.active { border-color: var(--sub); color: var(--sub); }
    button:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

    /* ── MSG ────────────────────────────────────── */
    .msg { font-size: 11px; min-height: 16px; margin-top: 5px; }
    .msg.ok   { color: var(--blast); }
    .msg.err  { color: var(--warn); }
    .msg.info { color: var(--dim); }

    /* ── WEAVE RESULTS ──────────────────────────── */
    .wr { padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
    .wr .nid { color: var(--weave); word-break: break-all; font-size: 10px; margin-top: 2px; }
    .wr .res { color: var(--gold); float: right; }
    .wr::after { content: ''; display: table; clear: both; }

    /* ── AUTH ───────────────────────────────────── */
    .auth-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
    .auth-tabs button { flex: 1; }
    .auth-form { display: flex; flex-direction: column; gap: 7px; }
    .user-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .user-bar .uname { color: var(--blast); font-size: 11px; }

    /* ── BLAST ──────────────────────────────────── */
    .blast-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
    .ccount { font-size: 10px; color: var(--dim); }
    .blast-controls { display: flex; gap: 6px; align-items: center; }
    .cbar { height: 2px; background: var(--border); border-radius: 1px; margin-top: 5px; }
    .cbar-fill { height: 100%; background: var(--blast); border-radius: 1px; transition: width 0.1s, background 0.1s; }

    /* ── FEED ───────────────────────────────────── */
    .post { padding: 9px 0; border-bottom: 1px solid var(--border); }
    .post-head { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .post-author { color: var(--sub); font-size: 11px; }
    .post-tag {
      font-size: 9px;
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 1px 5px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .post-tag.council { border-color: var(--weave); color: var(--weave); }
    .post-text { font-size: 12px; line-height: 1.6; word-break: break-word; }
    .post-time { font-size: 10px; color: var(--dim); margin-top: 4px; }
    .empty { color: var(--dim); font-size: 11px; text-align: center; padding: 24px 0; }
    .row { display: flex; gap: 6px; }
    .row > * { flex: 1; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    ⬡ CURSIV SUBSTRATE
    <span class="tagline">beneath · above · all around · no registrar · no DNS · no cloud</span>
  </div>
  <div id="server-badge" class="badge">connecting...</div>
</header>

<div class="grid">

  <!-- ── LEFT: Substrate + Weave ─────────────── -->
  <div class="panel">
    <div class="panel-head">⬡ substrate layer</div>
    <div class="panel-body">
      <div class="stat"><span class="lbl">nodes</span><span class="val" id="s-nodes">—</span></div>
      <div class="stat"><span class="lbl">edges</span><span class="val" id="s-edges">—</span></div>
      <div class="stat"><span class="lbl">activations</span><span class="val" id="s-acts">—</span></div>
      <div class="stat"><span class="lbl">mean weight</span><span class="val" id="s-weight">—</span></div>
      <div class="stat"><span class="lbl">status</span><span class="val" id="s-ok" style="color:var(--dim)">—</span></div>

      <div class="section-label">weave — resonance query</div>
      <input type="text" id="weave-q" placeholder="query the substrate..." maxlength="200" />
      <div class="row" style="margin-top:6px;">
        <button class="blue" onclick="doWeave()">weave</button>
        <select id="weave-k">
          <option value="3">top 3</option>
          <option value="5" selected>top 5</option>
          <option value="10">top 10</option>
        </select>
      </div>
      <div id="weave-results" style="margin-top:8px;"></div>
    </div>
  </div>

  <!-- ── CENTER: Auth + Blast ─────────────────── -->
  <div class="panel">
    <div class="panel-head">⬢ blast terminal</div>
    <div class="panel-body">
      <div id="auth-wrap"></div>
      <div id="blast-wrap" style="display:none;">
        <div class="user-bar">
          <span>logged in as <span class="uname" id="blast-user"></span></span>
          <button onclick="doLogout()">logout</button>
        </div>
        <textarea id="blast-txt" rows="9" placeholder="synthesis goes here — speak to the substrate..." maxlength="2000"
          oninput="updateBar()"></textarea>
        <div class="blast-footer">
          <span class="ccount"><span id="cn">0</span> / 2000</span>
          <div class="blast-controls">
            <select id="blast-src" style="width:auto;padding:5px 8px;">
              <option value="broadcast">broadcast</option>
              <option value="council">council</option>
            </select>
            <button class="green" id="blast-btn" onclick="doBlast()">blast</button>
          </div>
        </div>
        <div class="cbar"><div class="cbar-fill" id="cbar" style="width:0%"></div></div>
        <div class="msg" id="blast-msg"></div>
      </div>
    </div>
  </div>

  <!-- ── RIGHT: Feed ───────────────────────────── -->
  <div class="panel">
    <div class="panel-head">
      ◈ board feed
      <span id="feed-count" style="color:var(--dim);"></span>
    </div>
    <div class="panel-body" id="feed-body">
      <div class="empty">loading...</div>
    </div>
  </div>

</div><!-- /grid -->

<script>
const BASE = '';
let tok  = localStorage.getItem('cv_tok')  || '';
let user = localStorage.getItem('cv_user') || '';

/* ── boot ─────────────────────────────────────── */
window.addEventListener('load', () => {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/service-worker.js').catch(() => {});
  }
  ping();
  loadStatus();
  loadFeed();
  renderAuth();
  setInterval(loadFeed,   30000);
  setInterval(loadStatus, 15000);
  document.getElementById('weave-q').addEventListener('keydown', e => { if (e.key === 'Enter') doWeave(); });
});

/* ── ping ─────────────────────────────────────── */
async function ping() {
  try {
    const r = await fetch(BASE + '/health');
    if (r.ok) {
      const b = document.getElementById('server-badge');
      b.textContent = 'live  127.0.0.1:1969';
      b.className   = 'badge live';
    }
  } catch(e) {}
}

/* ── substrate status ─────────────────────────── */
async function loadStatus() {
  try {
    const r = await fetch(BASE + '/substrate/status');
    if (!r.ok) {
      document.getElementById('s-ok').textContent = '503 unavailable';
      return;
    }
    const d = await r.json();
    const L = d.layer || {};
    set('s-nodes',  L.nodes  ?? '—');
    set('s-edges',  L.edges  ?? '—');
    set('s-acts',   d.activations ?? '—');
    set('s-weight', L.mean_weight != null ? L.mean_weight.toFixed(4) : '—');
    const ok = document.getElementById('s-ok');
    ok.textContent  = 'active';
    ok.style.color  = 'var(--blast)';
  } catch(e) {}
}

/* ── weave ────────────────────────────────────── */
async function doWeave() {
  const q   = document.getElementById('weave-q').value.trim();
  const k   = document.getElementById('weave-k').value;
  const out = document.getElementById('weave-results');
  if (!q) return;
  out.innerHTML = '<div class="empty">resonating...</div>';
  try {
    const r = await fetch(`${BASE}/substrate/weave?q=${encodeURIComponent(q)}&top_k=${k}`);
    const d = await r.json();
    if (!d.resonant || !d.resonant.length) {
      out.innerHTML = '<div class="empty">no resonance — substrate empty</div>';
      return;
    }
    out.innerHTML = d.resonant.map(x => `
      <div class="wr">
        <span class="res">${x.resonance.toFixed(4)}</span>
        <div class="nid">${esc(x.node_id)}</div>
      </div>`
    ).join('');
  } catch(e) {
    out.innerHTML = '<div class="empty" style="color:var(--warn)">substrate unavailable</div>';
  }
}

/* ── feed ─────────────────────────────────────── */
async function loadFeed() {
  try {
    const r = await fetch(BASE + '/api/posts');
    const d = await r.json();
    const posts = d.posts || [];
    set('feed-count', posts.length + ' posts');
    const body = document.getElementById('feed-body');
    if (!posts.length) { body.innerHTML = '<div class="empty">no transmissions yet</div>'; return; }
    body.innerHTML = posts.map(p => `
      <div class="post">
        <div class="post-head">
          <span class="post-author">@${esc(p.username)}</span>
          <span class="post-tag${p.source === 'council' ? ' council' : ''}">${esc(p.source)}</span>
        </div>
        <div class="post-text">${esc(p.text)}</div>
        <div class="post-time">${age(p.timestamp)}</div>
      </div>`
    ).join('');
  } catch(e) {}
}

/* ── auth ─────────────────────────────────────── */
let _mode = 'login';

function renderAuth() {
  const aw = document.getElementById('auth-wrap');
  const bw = document.getElementById('blast-wrap');
  if (tok && user) {
    aw.innerHTML = '';
    bw.style.display = 'block';
    set('blast-user', user);
  } else {
    bw.style.display = 'none';
    aw.innerHTML = `
      <div class="auth-tabs">
        <button id="tab-l" class="active" onclick="switchTab('login')">login</button>
        <button id="tab-r" onclick="switchTab('register')">register</button>
      </div>
      <div class="auth-form">
        <input type="text" id="au" placeholder="username" />
        <input type="password" id="ap" placeholder="password" />
        <div id="ap2w" style="display:none;">
          <input type="password" id="ap2" placeholder="confirm password" />
        </div>
        <button class="blue" id="auth-btn" onclick="doAuth()">login</button>
        <div class="msg" id="auth-msg"></div>
      </div>`;
    ['au','ap'].forEach(id =>
      document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doAuth(); })
    );
  }
}

function switchTab(m) {
  _mode = m;
  document.getElementById('tab-l').className = m === 'login'    ? 'active' : '';
  document.getElementById('tab-r').className = m === 'register' ? 'active' : '';
  document.getElementById('ap2w').style.display = m === 'register' ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = m;
  document.getElementById('auth-msg').textContent = '';
}

async function doAuth() {
  const u    = document.getElementById('au').value.trim();
  const p    = document.getElementById('ap').value;
  const msg  = document.getElementById('auth-msg');
  if (!u || !p) { setMsg(msg, 'fill in username and password', 'err'); return; }
  if (_mode === 'register') {
    const p2 = document.getElementById('ap2').value;
    if (p !== p2) { setMsg(msg, 'passwords do not match', 'err'); return; }
    const r = await post('/api/register', {username: u, password: p});
    if (r.status === 201) {
      setMsg(msg, 'registered — logging in...', 'ok');
      await login(u, p, msg);
    } else {
      const d = await r.json().catch(() => ({}));
      setMsg(msg, d.detail || 'registration failed', 'err');
    }
  } else {
    await login(u, p, msg);
  }
}

async function login(u, p, msg) {
  const r = await post('/api/login', {username: u, password: p});
  if (r.ok) {
    const d = await r.json();
    tok  = d.token;    user = d.username;
    localStorage.setItem('cv_tok', tok);
    localStorage.setItem('cv_user', user);
    renderAuth();
  } else {
    const d = await r.json().catch(() => ({}));
    setMsg(msg, d.detail || 'invalid credentials', 'err');
  }
}

function doLogout() {
  tok = ''; user = '';
  localStorage.removeItem('cv_tok');
  localStorage.removeItem('cv_user');
  renderAuth();
}

/* ── blast ────────────────────────────────────── */
async function doBlast() {
  const txt = document.getElementById('blast-txt').value.trim();
  const src = document.getElementById('blast-src').value;
  const msg = document.getElementById('blast-msg');
  const btn = document.getElementById('blast-btn');
  if (!txt) { setMsg(msg, 'write something first', 'err'); return; }
  btn.disabled = true;
  setMsg(msg, 'transmitting...', 'info');
  try {
    const r = await fetch(BASE + '/api/blast', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+tok},
      body: JSON.stringify({text: txt, source: src})
    });
    if (r.status === 201) {
      document.getElementById('blast-txt').value = '';
      updateBar();
      setMsg(msg, 'transmission received by the substrate', 'ok');
      loadFeed();
    } else if (r.status === 401) {
      setMsg(msg, 'session expired — log in again', 'err');
      doLogout();
    } else if (r.status === 429) {
      setMsg(msg, 'daily limit reached — 4 transmissions per day', 'err');
    } else {
      const d = await r.json().catch(() => ({}));
      setMsg(msg, d.detail || 'transmission failed', 'err');
    }
  } catch(e) { setMsg(msg, 'server unreachable', 'err'); }
  btn.disabled = false;
}

/* ── helpers ──────────────────────────────────── */
function updateBar() {
  const n   = document.getElementById('blast-txt').value.length;
  const pct = (n / 2000) * 100;
  set('cn', n);
  const b = document.getElementById('cbar');
  b.style.width      = pct + '%';
  b.style.background = pct > 90 ? 'var(--warn)' : 'var(--blast)';
}

async function post(path, body) {
  try {
    return await fetch(BASE + path, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
  } catch(e) { return {ok: false, status: 0, json: async () => ({})}; }
}

function set(id, v) { const el = document.getElementById(id); if (el) el.textContent = v; }

function setMsg(el, txt, type) { el.textContent = txt; el.className = 'msg ' + type; }

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function age(ts) {
  try {
    const d    = new Date(ts.includes('Z') ? ts : ts + 'Z');
    const diff = Math.floor((Date.now() - d) / 1000);
    if (diff < 60)    return diff + 's ago';
    if (diff < 3600)  return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return d.toLocaleDateString();
  } catch(e) { return ts; }
}
</script>
</body>
</html>
