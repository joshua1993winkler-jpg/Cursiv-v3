# CURSIV-CRUCIBLE-STAMP END
[build-system]
requires = ["setuptools>=70", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "cursiv"
version = "2.1.5"
description = "The Sovereign Agent Temple — local-first AI agent operating system"
authors = [{name = "Joshua Winkler", email = "joshua.1993.winkler@gmail.com"}]
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "streamlit>=1.32.0",
    "gradio>=4.44.0",
    "prompt_toolkit>=3.0.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.4"]
ollama = []  # No extra deps — uses urllib only
xai = []     # No extra deps — uses urllib only
openai = []  # No extra deps — uses urllib only

[project.scripts]
cursiv       = "cursiv_v215.ui.chat_cli:main"
cursiv-forge = "cursiv_v215.forge.factory:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["cursiv_v215*"]

[tool.ruff]
line-length = 100
target-version = "py311"
